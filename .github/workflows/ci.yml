name: CI
on: [push, pull_request]
permissions:
  contents: read
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint
        run: flake8 --max-line-length=120 data_to_melody.py genre_fusion.py song_builder.py visualizer.py app.py
      - name: Import check
        run: python -c "import data_to_melody, genre_fusion, song_builder, visualizer, app"
      - name: Tests
        run: pytest tests/ -v
